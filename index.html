<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culpuyls Studio</title>
    <style>
        /* Estilo moderno y minimalista */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212; /* Fondo oscuro pro */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 0;
            letter-spacing: -1px;
        }
        h2 {
            font-size: 1.5rem;
            font-weight: 300;
            color: #bb86fc; /* Un toque de color para el subtítulo */
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 5px;
        }
        .links {
            margin-top: 40px;
        }
        .btn {
            display: inline-block;
            text-decoration: none;
            color: #03dac6;
            border: 2px solid #03dac6;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background-color: #03dac6;
            color: #121212;
            transform: translateY(-3px);
        }
        footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.8rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Culpuyls Studio</h1>
        <h2>Games</h2>

        <div class="links">
            <p>Echa un vistazo a nuestro juego estrella:</p>
            <a href="https://culpuyls.github.io/bearslot-game/" class="btn">Jugar a BearSlot Game</a>
        </div>
    </div>

    <footer>
        &copy; 2024 Culpuyls Studio. Todos los derechos reservados.
    </footer>

</body>
</html>
